[package]
name = "econ-sim"
version = "0.1.0"
edition = "2021"

[dependencies]
bevy = "0.18"

# Build dependencies with optimizations even in dev so the sim runs smoothly,
# while keeping our own crate fast to recompile.
[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3

# Smaller, faster wasm for the deployed build.
[profile.release]
opt-level = "s"
lto = "thin"
codegen-units = 1
panic = "abort"
strip = true
