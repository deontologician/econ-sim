<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>econ-sim</title>
    <link
      data-trunk
      rel="rust"
      data-wasm-opt="z"
      data-wasm-opt-params="--all-features"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #14181f;
        /* Mobile: stop the page from scrolling/bouncing so gestures reach the game. */
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        outline: none;
        /* Let the game handle all touch gestures (pan/pinch), not the browser. */
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
      }

      /* Loading screen shown while the wasm bundle downloads and Bevy boots.
         Bevy adds the `ready` class once it has rendered its first frame,
         fading the overlay out and letting gestures fall through to the canvas. */
      .loading-overlay {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #14181f;
        color: #cfd6e0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        transition: opacity 0.45s ease;
      }
      .loading-overlay.ready {
        opacity: 0;
        pointer-events: none;
      }
      .loading-box {
        width: min(70vw, 320px);
        text-align: center;
      }
      .loading-title {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }
      .loading-sub {
        margin-top: 6px;
        font-size: 13px;
        opacity: 0.7;
      }
      .loading-track {
        margin-top: 16px;
        height: 6px;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.12);
        overflow: hidden;
      }
      .loading-bar {
        height: 100%;
        width: 0;
        border-radius: 3px;
        background: linear-gradient(90deg, #3aa873, #6cc99a);
        /* Climb toward ~92% and hold; the `ready` state snaps it to 100%. */
        animation: load-progress 8s cubic-bezier(0.1, 0.7, 0.2, 1) forwards;
      }
      .loading-overlay.ready .loading-bar {
        width: 100%;
        animation: none;
        transition: width 0.3s ease;
      }
      @keyframes load-progress {
        0% {
          width: 0;
        }
        60% {
          width: 75%;
        }
        100% {
          width: 92%;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="bevy"></canvas>
    <div id="loading" class="loading-overlay">
      <div class="loading-box">
        <div class="loading-title">econ-sim</div>
        <div class="loading-sub">loading simulation…</div>
        <div class="loading-track"><div class="loading-bar"></div></div>
      </div>
    </div>
  </body>
</html>
