name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run
# in-progress and latest queued. Do not cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      # Project pages are served from a subpath, so assets must resolve
      # relative to /econ-sim/. LEADERBOARD_URL is baked in via option_env! — set the repo
      # variable LEADERBOARD_SUBMIT_URL (Settings → Secrets and variables → Actions →
      # Variables) to the Sprite's public submit URL to turn reporting on; leave it unset to
      # keep the build phoning home nowhere.
      - name: Build wasm bundle
        env:
          LEADERBOARD_URL: ${{ vars.LEADERBOARD_SUBMIT_URL }}
        run: trunk build --release --public-url /econ-sim/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
